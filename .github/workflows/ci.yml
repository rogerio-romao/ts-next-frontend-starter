name: CI
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
jobs:
    checks:
        name: Lint, Typecheck & Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install
            - name: ESLint
              run: pnpm run lint
            - name: CSS Lint
              run: pnpm run lint:css
            - name: Typecheck
              run: pnpm run typecheck
            - name: Unit Tests
              run: pnpm run test:ci
    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install
            - name: Cache Next.js build
              uses: actions/cache@v4
              with:
                  path: .next/cache
                  key:
                      nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{
                      hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx',
                      '**/*.css') }}
                  restore-keys: |
                      nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            - name: Build
              run: pnpm run build
    e2e:
        name: Playwright E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install
            - name: Get Playwright version
              id: playwright-version
              run: echo "version=$(pnpm ls @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"
            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ steps.playwright-version.outputs.version }}
            - name: Install Playwright Browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm exec playwright install chromium --with-deps
            - name: Install Playwright OS dependencies
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: pnpm exec playwright install-deps chromium
            - name: Run Playwright Tests
              run: pnpm run test:e2e
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30
